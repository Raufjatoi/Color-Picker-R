<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Color Picker R</h2>
    </div>
    
    <div class="actions">
      <button id="btn-pick" class="btn primary">
        <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>
        Pick Color
      </button>
      <button id="btn-extract" class="btn secondary">
        <svg xmlns="http://www.w3.org/w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 8 4 4-4 4"/><path d="M4 12h16"/><path d="M4 8v8"/></svg>
        Extract Colors
      </button>
    </div>

    <!-- Hidden until extraction completes -->
    <div id="loading" class="hidden">Processing image...</div>
    <div id="results-container" class="hidden">
      <h3>Dominant Colors</h3>
      <div id="color-grid" class="color-grid"></div>
    </div>
    
    <div id="toast" class="toast hidden">Copied to clipboard!</div>
  </div>
  
  <script src="../lib/kmeans.js"></script>
  <script src="popup.js"></script>
</body>
</html>
